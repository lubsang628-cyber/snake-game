<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .game-container {
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 28px;
        }
        .info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #fff;
            font-size: 18px;
        }
        .info span {
            background: #0f3460;
            padding: 8px 20px;
            border-radius: 10px;
        }
        canvas {
            background: #0f3460;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
            border: 3px solid #e94560;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #c73652;
            transform: scale(1.05);
        }
        .difficulty {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .difficulty button {
            background: #0f3460;
            padding: 8px 16px;
            font-size: 14px;
        }
        .difficulty button.active {
            background: #e94560;
        }
        @media (max-width: 500px) {
            .game-container { padding: 15px; }
            canvas { width: 100%; height: auto; }
            .info { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        <div class="info">
            <span>🏆 得分: <b id="score">0</b></span>
            <span>📏 长度: <b id="length">3</b></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <div class="difficulty">
                <button data-speed="150" class="active">简单</button>
                <button data-speed="100">普通</button>
                <button data-speed="60">困难</button>
            </div>
            <button id="restartBtn">🔄 重新开始</button>
        </div>
        <p style="color:#888; margin-top:12px; font-size:14px;">⬆⬇⬅➡ 方向键 / 滑动屏幕</p >
    </div>

    <script>
        // ===== 游戏核心逻辑 =====
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const lengthDisplay = document.getElementById('length');

        const GRID_SIZE = 20;
        const TILE_COUNT = 20;
        let speed = 150;
        let gameInterval = null;
        let gameRunning = false;

        let snake = [
            {x: 10, y: 10},
            {x: 9, y: 10},
            {x: 8, y: 10}
        ];
        let direction = {dx: 1, dy: 0};
        let nextDirection = {dx: 1, dy: 0};
        let food = {x: 15, y: 10};
        let score = 0;
        let gameOver = false;

        // 生成食物（避开蛇身）
        function generateFood() {
            const totalCells = TILE_COUNT * TILE_COUNT;
            if (snake.length >= totalCells) {
                return null;
            }
            const snakeSet = new Set(snake.map(cell => `${cell.x},${cell.y}`));
            let freeCells = [];
            for (let i = 0; i < TILE_COUNT; i++) {
                for (let j = 0; j < TILE_COUNT; j++) {
                    if (!snakeSet.has(`${i},${j}`)) {
                        freeCells.push({x: i, y: j});
                    }
                }
            }
            if (freeCells.length === 0) return null;
            const rand = Math.floor(Math.random() * freeCells.length);
            return freeCells[rand];
        }

        // 重置游戏
        function resetGame() {
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            direction = {dx: 1, dy: 0};
            nextDirection = {dx: 1, dy: 0};
            score = 0;
            gameOver = false;
            gameRunning = true;
            const newFood = generateFood();
            if (newFood) food = newFood;
            else food = {x: 15, y: 10};
            updateScore();
            drawCanvas();
            startLoop();
        }

        // 开始循环
        function startLoop() {
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                if (!gameOver && gameRunning) {
                    moveSnake();
                    drawCanvas();
                }
            }, speed);
        }

        // 蛇移动
        function moveSnake() {
            if (gameOver) return;
            direction = {...nextDirection};
            const head = {x: snake[0].x + direction.dx, y: snake[0].y + direction.dy};

            // 撞墙检测
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                endGame();
                return;
            }

            // 撞自身检测
            const snakeSet = new Set(snake.map(cell => `${cell.x},${cell.y}`));
            if (snakeSet.has(`${head.x},${head.y}`)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score++;
                updateScore();
                const newFood = generateFood();
                if (newFood) {
                    food = newFood;
                } else {
                    // 胜利！
                    gameRunning = false;
                    if (gameInterval) clearInterval(gameInterval);
                    alert('🎉 恭喜你赢了！所有格子都填满了！');
                    resetGame();
                    return;
                }
            } else {
                snake.pop();
            }
        }

        // 结束游戏
        function endGame() {
            if (gameOver) return;
            gameOver = true;
            gameRunning = false;
            if (gameInterval) clearInterval(gameInterval);
            drawCanvas();
            setTimeout(() => {
                alert('💀 游戏结束！得分: ' + score);
            }, 100);
        }

        // 更新分数显示
        function updateScore() {
            scoreDisplay.textContent = score;
            lengthDisplay.textContent = snake.length;
        }

        // 绘制画面
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            for (let i = 0; i < TILE_COUNT; i++) {
                for (let j = 0; j < TILE_COUNT; j++) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                    ctx.strokeRect(i * GRID_SIZE, j * GRID_SIZE, GRID_SIZE, GRID_SIZE);
                }
            }

            // 绘制食物
            ctx.fillStyle = '#e94560';
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2 - 2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * GRID_SIZE + 4, segment.y * GRID_SIZE + 4, 2,
                    segment.x * GRID_SIZE + GRID_SIZE/2, segment.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2
                );
                if (index === 0) {
                    gradient.addColorStop(0, '#4ecdc4');
                    gradient.addColorStop(1, '#44b39d');
                } else {
                    gradient.addColorStop(0, '#45b7d1');
                    gradient.addColorStop(1, '#2e8b9e');
                }
                ctx.fillStyle = gradient;
                ctx.shadowColor = index === 0 ? '#4ecdc4' : '#45b7d1';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.roundRect(segment.x * GRID_SIZE + 1, segment.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2, 4);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // 游戏结束蒙层
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
                ctx.font = '18px Arial';
                ctx.fillText('得分: ' + score, canvas.width/2, canvas.height/2 + 50);
            }
        }

        // roundRect polyfill for canvas
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };
        }

        // ===== 键盘控制 =====
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            e.preventDefault();
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                e.preventDefault();
                switch(key) {
                    case 'ArrowUp':    if (direction.dy !== 1) nextDirection = {dx: 0, dy: -1}; break;
                    case 'ArrowDown':  if (direction.dy !== -1) nextDirection = {dx: 0, dy: 1}; break;
                    case 'ArrowLeft':  if (direction.dx !== 1) nextDirection = {dx: -1, dy: 0}; break;
                    case 'ArrowRight': if (direction.dx !== -1) nextDirection = {dx: 1, dy: 0}; break;
                }
            }
        });

        // ===== 触控/移动端滑动控制 =====
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!touchStartX || !touchStartY) return;
            const touch = e.touches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && direction.dx !== -1) nextDirection = {dx: 1, dy: 0};
                else if (dx < 0 && direction.dx !== 1) nextDirection = {dx: -1, dy: 0};
            } else {
                if (dy > 0 && direction.dy !== -1) nextDirection = {dx: 0, dy: 1};
                else if (dy < 0 && direction.dy !== 1) nextDirection = {dx: 0, dy: -1};
            }
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        });
        canvas.addEventListener('touchend', (e) => {
            touchStartX = 0;
            touchStartY = 0;
        });

        // ===== 难度按钮 =====
        document.querySelectorAll('.difficulty button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                speed = parseInt(this.dataset.speed);
                if (gameRunning || gameOver) {
                    resetGame();
                }
            });
        });

        // ===== 重新开始按钮 =====
        document.getElementById('restartBtn').addEventListener('click', resetGame);

        // ===== 启动游戏 =====
        resetGame();
    </script>
</body>
</html>
